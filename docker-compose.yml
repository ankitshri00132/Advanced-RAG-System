version : "3.9"

services : 
  qdrant :
    image: qdrant/qdrant:latest

    ports :
    - "6333:6333"
    - "6334:6334"

    volumes : 
    - ./collections:/qdrant/storage

  backend:
      build :
        context : .
        dockerfile: Dockerfile

      ports:
        - "8000:8000"

      env_file:
        - .env
      
      depends_on:
        - qdrant

      restart : unless-stopped
      
