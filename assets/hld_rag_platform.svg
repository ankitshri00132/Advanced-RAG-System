<svg width="100%" viewBox="0 0 720 920" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>High Level Design — RAG Document Intelligence Platform (CRAG)</title>
  <desc>System overview showing the ingestion pipeline feeding Qdrant, and the LangGraph CRAG query pipeline with query routing, retrieval, reranking, document grading, query transformation, web search fallback, LangSmith observability, and AWS deployment layers.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- Glow filter for nodes -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="720" height="920" rx="0" fill="#1a1a1a"/>

  <!-- ── INGESTION PIPELINE container ── -->
  <rect x="30" y="28" width="660" height="130" rx="14" stroke-width="0.5" fill-opacity="0.08" fill="rgb(8,80,65)" stroke="rgb(93,202,165)"/>
  <text x="46" y="50" fill="rgb(250,249,245)" font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="600">Ingestion Pipeline</text>

  <!-- Ingestion nodes -->
  <g>
    <rect x="50" y="62" width="120" height="72" rx="8" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)"/>
    <text x="110" y="88" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Document</text>
    <text x="110" y="105" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Loader</text>
    <text x="110" y="122" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">PyMuPDF · Unstructured</text>
  </g>

  <g>
    <rect x="200" y="62" width="120" height="72" rx="8" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)"/>
    <text x="260" y="91" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Chunker</text>
    <text x="260" y="110" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Recursive +</text>
    <text x="260" y="124" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Semantic</text>
  </g>

  <g>
    <rect x="350" y="62" width="120" height="72" rx="8" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)"/>
    <text x="410" y="91" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Embedder</text>
    <text x="410" y="110" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">BGE dense</text>
    <text x="410" y="124" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">BM42 sparse</text>
  </g>

  <g>
    <rect x="500" y="62" width="170" height="72" rx="8" stroke-width="0.5" fill="rgb(60,52,137)" stroke="rgb(175,169,236)"/>
    <text x="585" y="88" text-anchor="middle" dominant-baseline="central" fill="rgb(206,203,246)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Qdrant</text>
    <text x="585" y="107" text-anchor="middle" dominant-baseline="central" fill="rgb(175,169,236)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Dense + Sparse vectors</text>
    <text x="585" y="122" text-anchor="middle" dominant-baseline="central" fill="rgb(175,169,236)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Docker local / cloud.qdrant.io</text>
  </g>

  <!-- Ingestion arrows -->
  <line x1="170" y1="98" x2="198" y2="98" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1.5" fill="none"/>
  <line x1="320" y1="98" x2="348" y2="98" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1.5" fill="none"/>
  <line x1="470" y1="98" x2="498" y2="98" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1.5" fill="none"/>

  <!-- Arrow from Qdrant down to query pipeline -->
  <line x1="585" y1="134" x2="585" y2="190" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1.5" fill="none"/>
  <text x="596" y="168" dominant-baseline="central" fill="rgb(194,192,182)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">indexed</text>

  <!-- ── LANGGRAPH CRAG PIPELINE container ── -->
  <rect x="30" y="192" width="660" height="460" rx="14" stroke-width="0.5" fill-opacity="0.06" fill="rgb(60,52,137)" stroke="rgb(175,169,236)"/>
  <text x="46" y="214" fill="rgb(250,249,245)" font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="600">LangGraph CRAG — query pipeline</text>

  <!-- Row 1: Query Router -->
  <g>
    <rect x="245" y="230" width="210" height="52" rx="8" stroke-width="0.5" fill="rgb(60,52,137)" stroke="rgb(175,169,236)"/>
    <text x="350" y="250" text-anchor="middle" dominant-baseline="central" fill="rgb(206,203,246)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Query Router Node</text>
    <text x="350" y="268" text-anchor="middle" dominant-baseline="central" fill="rgb(175,169,236)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Classify: retrieve / direct_llm</text>
  </g>

  <!-- Row 2 left: Retrieve Node -->
  <g>
    <rect x="60" y="325" width="200" height="52" rx="8" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)"/>
    <text x="160" y="344" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Retrieve Node</text>
    <text x="160" y="362" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Qdrant hybrid: dense + BM42 RRF</text>
  </g>

  <!-- Row 2 right: Direct Generate Node -->
  <g>
    <rect x="460" y="325" width="200" height="52" rx="8" stroke-width="0.5" fill="rgb(60,52,137)" stroke="rgb(175,169,236)"/>
    <text x="560" y="344" text-anchor="middle" dominant-baseline="central" fill="rgb(206,203,246)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Direct Generate Node</text>
    <text x="560" y="362" text-anchor="middle" dominant-baseline="central" fill="rgb(175,169,236)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Groq · LLaMA-3.3 70B</text>
  </g>

  <!-- Router → Retrieve -->
  <path d="M305 282 L305 305 L160 305 L160 323" fill="none" stroke="rgb(156,154,146)" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="190" y="300" fill="rgb(194,192,182)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">retrieve</text>

  <!-- Router → Direct Generate -->
  <path d="M395 282 L395 305 L560 305 L560 323" fill="none" stroke="rgb(156,154,146)" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="455" y="300" fill="rgb(194,192,182)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">direct_llm</text>

  <!-- Direct Generate → END label -->
  <line x1="560" y1="377" x2="560" y2="408" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1" fill="none"/>
  <rect x="535" y="410" width="50" height="24" rx="12" fill="rgb(68,68,65)" stroke="rgb(180,178,169)" stroke-width="0.5"/>
  <text x="560" y="423" text-anchor="middle" dominant-baseline="central" fill="rgb(211,209,199)" font-family="'Inter','Segoe UI',sans-serif" font-size="11" font-weight="500">END</text>

  <!-- Row 3: Re-rank Node (AFTER Retrieve, BEFORE Grade) -->
  <g>
    <rect x="60" y="410" width="200" height="52" rx="8" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)"/>
    <text x="160" y="429" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Re-rank Node</text>
    <text x="160" y="447" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Jina Reranker v1 Tiny EN</text>
  </g>

  <!-- Retrieve → Re-rank -->
  <line x1="160" y1="377" x2="160" y2="408" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1" fill="none"/>

  <!-- Row 4: Grade Documents (AFTER Re-rank) -->
  <g>
    <rect x="60" y="495" width="200" height="52" rx="8" stroke-width="0.5" fill="rgb(99,56,6)" stroke="rgb(239,159,39)"/>
    <text x="160" y="514" text-anchor="middle" dominant-baseline="central" fill="rgb(250,199,117)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Grade Documents Node</text>
    <text x="160" y="532" text-anchor="middle" dominant-baseline="central" fill="rgb(239,159,39)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">CRAG: score chunk relevance</text>
  </g>

  <!-- Re-rank → Grade -->
  <line x1="160" y1="462" x2="160" y2="493" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1" fill="none"/>

  <!-- Row 5 left: Generate Answer Node -->
  <g>
    <rect x="60" y="590" width="200" height="52" rx="8" stroke-width="0.5" fill="rgb(60,52,137)" stroke="rgb(175,169,236)"/>
    <text x="160" y="609" text-anchor="middle" dominant-baseline="central" fill="rgb(206,203,246)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Generate Answer Node</text>
    <text x="160" y="627" text-anchor="middle" dominant-baseline="central" fill="rgb(175,169,236)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Groq · LLaMA-3.3 70B</text>
  </g>

  <!-- Row 5 right: Transform Query Node -->
  <g>
    <rect x="340" y="495" width="180" height="52" rx="8" stroke-width="0.5" fill="rgb(113,43,19)" stroke="rgb(240,153,123)"/>
    <text x="430" y="514" text-anchor="middle" dominant-baseline="central" fill="rgb(245,196,179)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Transform Query Node</text>
    <text x="430" y="532" text-anchor="middle" dominant-baseline="central" fill="rgb(240,153,123)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">LLM rewrite · retry_count</text>
  </g>

  <!-- Web Search Node -->
  <g>
    <rect x="340" y="590" width="180" height="52" rx="8" stroke-width="0.5" fill="rgb(68,68,65)" stroke="rgb(180,178,169)"/>
    <text x="430" y="609" text-anchor="middle" dominant-baseline="central" fill="rgb(211,209,199)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Web Search Node</text>
    <text x="430" y="627" text-anchor="middle" dominant-baseline="central" fill="rgb(180,178,169)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Tavily fallback (retry > 2)</text>
  </g>

  <!-- Grade → Generate (relevant) -->
  <path d="M160 547 L160 588" fill="none" stroke="rgb(156,154,146)" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="115" y="570" fill="rgb(93,202,165)" font-family="'Inter','Segoe UI',sans-serif" font-size="11" font-weight="500">relevant ✓</text>

  <!-- Grade → Transform Query (not relevant) -->
  <path d="M260 521 L338 521" fill="none" stroke="rgb(156,154,146)" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="280" y="513" fill="rgb(240,153,123)" font-family="'Inter','Segoe UI',sans-serif" font-size="11" font-weight="500">not relevant ✗</text>

  <!-- Transform Query → Retrieve (retry loop, dashed) -->
  <path d="M430 495 L430 480 L38 480 L38 351 L58 351" fill="none" stroke="rgb(240,153,123)" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="155" y="488" fill="rgb(194,192,182)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">retry loop (retry ≤ 2)</text>

  <!-- Transform Query → Web Search (retry > 2) -->
  <path d="M430 547 L430 588" fill="none" stroke="rgb(156,154,146)" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="442" y="570" fill="rgb(194,192,182)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">retry > 2</text>

  <!-- Web Search → Generate Answer -->
  <line x1="340" y1="616" x2="262" y2="616" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1" fill="none"/>

  <!-- Generate → Response label + arrow out -->
  <line x1="160" y1="642" x2="160" y2="660" marker-end="url(#arrow)" stroke="rgb(156,154,146)" stroke-width="1" fill="none"/>
  <text x="174" y="656" fill="rgb(194,192,182)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Response</text>

  <!-- ── OBSERVABILITY + API layer ── -->
  <rect x="30" y="674" width="310" height="68" rx="12" stroke-width="0.5" fill-opacity="0.08" fill="rgb(68,68,65)" stroke="rgb(180,178,169)"/>
  <text x="46" y="694" fill="rgb(250,249,245)" font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="600">Observability</text>
  <g>
    <rect x="46" y="702" width="130" height="28" rx="6" stroke-width="0.5" fill="rgb(68,68,65)" stroke="rgb(180,178,169)"/>
    <text x="111" y="717" text-anchor="middle" dominant-baseline="central" fill="rgb(180,178,169)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">LangSmith traces</text>
  </g>
  <g>
    <rect x="192" y="702" width="130" height="28" rx="6" stroke-width="0.5" fill="rgb(68,68,65)" stroke="rgb(180,178,169)"/>
    <text x="257" y="717" text-anchor="middle" dominant-baseline="central" fill="rgb(180,178,169)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">RAGAS evaluation</text>
  </g>

  <!-- API & UI layer -->
  <rect x="360" y="674" width="330" height="68" rx="12" stroke-width="0.5" fill-opacity="0.08" fill="rgb(12,68,124)" stroke="rgb(133,183,235)"/>
  <text x="376" y="694" fill="rgb(250,249,245)" font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="600">API &amp; UI</text>
  <g>
    <rect x="376" y="702" width="140" height="28" rx="6" stroke-width="0.5" fill="rgb(12,68,124)" stroke="rgb(133,183,235)"/>
    <text x="446" y="717" text-anchor="middle" dominant-baseline="central" fill="rgb(133,183,235)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">FastAPI · Uvicorn</text>
  </g>
  <g>
    <rect x="532" y="702" width="140" height="28" rx="6" stroke-width="0.5" fill="rgb(12,68,124)" stroke="rgb(133,183,235)"/>
    <text x="602" y="717" text-anchor="middle" dominant-baseline="central" fill="rgb(133,183,235)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Streamlit UI</text>
  </g>

  <!-- ── DEPLOYMENT layer ── -->
  <rect x="30" y="764" width="660" height="96" rx="14" stroke-width="0.5" fill-opacity="0.06" fill="rgb(68,68,65)" stroke="rgb(180,178,169)"/>
  <text x="46" y="784" fill="rgb(250,249,245)" font-family="'Inter','Segoe UI',sans-serif" font-size="14" font-weight="600">Deployment</text>

  <g>
    <rect x="50" y="796" width="160" height="44" rx="8" stroke-width="0.5" fill="rgb(68,68,65)" stroke="rgb(180,178,169)"/>
    <text x="130" y="812" text-anchor="middle" dominant-baseline="central" fill="rgb(211,209,199)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Docker Compose</text>
    <text x="130" y="828" text-anchor="middle" dominant-baseline="central" fill="rgb(180,178,169)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Qdrant + Backend + UI</text>
  </g>

  <g>
    <rect x="234" y="796" width="140" height="44" rx="8" stroke-width="0.5" fill="rgb(68,68,65)" stroke="rgb(180,178,169)"/>
    <text x="304" y="812" text-anchor="middle" dominant-baseline="central" fill="rgb(211,209,199)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">GitHub Actions</text>
    <text x="304" y="828" text-anchor="middle" dominant-baseline="central" fill="rgb(180,178,169)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">pytest → build → ECR</text>
  </g>

  <g>
    <rect x="398" y="796" width="140" height="44" rx="8" stroke-width="0.5" fill="rgb(68,68,65)" stroke="rgb(180,178,169)"/>
    <text x="468" y="812" text-anchor="middle" dominant-baseline="central" fill="rgb(211,209,199)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">AWS EC2 + ECR</text>
    <text x="468" y="828" text-anchor="middle" dominant-baseline="central" fill="rgb(180,178,169)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">Production host</text>
  </g>

  <g>
    <rect x="562" y="796" width="108" height="44" rx="8" stroke-width="0.5" fill="rgb(8,80,65)" stroke="rgb(93,202,165)"/>
    <text x="616" y="812" text-anchor="middle" dominant-baseline="central" fill="rgb(159,225,203)" font-family="'Inter','Segoe UI',sans-serif" font-size="13" font-weight="500">Qdrant</text>
    <text x="616" y="828" text-anchor="middle" dominant-baseline="central" fill="rgb(93,202,165)" font-family="'Inter','Segoe UI',sans-serif" font-size="11">cloud</text>
  </g>

</svg>